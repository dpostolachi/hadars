<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
@import "tailwindcss";
/* Prevent Tailwind from scanning hadars' build output — otherwise it rescans
   .hadars/index.ssr.js on every rebuild and causes an infinite rebuild loop. */
@source not ".hadars";

/* ── reset ───────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; }

body {
    margin: 0;
    background: #0d0d10;
    color: #e4e4e7;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    line-height: 1.6;
    font-size: 16px;
}

/* ── layout ──────────────────────────────────────────────────────────────── */
.layout {
    max-width: 860px;
    margin: 0 auto;
    padding: 0 24px 80px;
}

/* ── navbar ──────────────────────────────────────────────────────────────── */
.navbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 0;
    border-bottom: 1px solid #27272a;
    margin-bottom: 64px;
}

.navbar-brand {
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: #fff;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
}

.navbar-links {
    display: flex;
    gap: 28px;
}

.navbar-links a {
    color: #a1a1aa;
    text-decoration: none;
    font-size: 0.875rem;
    transition: color 0.15s;
}

.navbar-links a:hover { color: #e4e4e7; }

/* ── hero ────────────────────────────────────────────────────────────────── */
.hero {
    padding: 16px 0 72px;
    text-align: center;
}

.hero-badges {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin-bottom: 28px;
}

.pill {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 9999px;
    font-size: 0.75rem;
    font-weight: 500;
    background: #18181b;
    border: 1px solid #3f3f46;
    color: #a1a1aa;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
}

.hero h1 {
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 700;
    letter-spacing: -1.5px;
    line-height: 1.15;
    color: #fff;
    margin: 0 0 20px;
}

.hero-sub {
    color: #a1a1aa;
    font-size: 1.1rem;
    max-width: 560px;
    margin: 0 auto 32px;
}

.hero-cta {
    display: inline-block;
}

.hero-cta .code-block {
    font-size: 0.95rem;
    padding: 12px 24px;
    display: inline-block;
}

/* ── feature grid ────────────────────────────────────────────────────────── */
.features-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 16px;
    margin-bottom: 80px;
}

.feature-card {
    background: #18181b;
    border: 1px solid #27272a;
    border-radius: 10px;
    padding: 20px 22px;
}

.feature-icon {
    font-size: 1.4rem;
    display: block;
    margin-bottom: 10px;
}

.feature-card h3 {
    font-size: 0.95rem;
    font-weight: 600;
    color: #fff;
    margin: 0 0 6px;
}

.feature-card p {
    font-size: 0.85rem;
    color: #71717a;
    margin: 0;
}

/* ── doc sections ────────────────────────────────────────────────────────── */
.doc-section {
    margin-bottom: 72px;
}

.doc-section h2 {
    font-size: 1.6rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
    margin: 0 0 24px;
    padding-bottom: 12px;
    border-bottom: 1px solid #27272a;
}

.doc-section h3 {
    font-size: 1rem;
    font-weight: 600;
    color: #d4d4d8;
    margin: 28px 0 10px;
}

.doc-section p {
    color: #a1a1aa;
    margin: 0 0 16px;
    font-size: 0.95rem;
}

/* ── code blocks ─────────────────────────────────────────────────────────── */
.code-block {
    background: #18181b;
    border: 1px solid #27272a;
    border-radius: 8px;
    padding: 16px 20px;
    overflow-x: auto;
    margin: 0 0 16px;
    font-size: 0.82rem;
    line-height: 1.6;
    white-space: pre;
}

.code-block code {
    font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    color: #d4d4d8;
}

/* Prism token colours — VS Code Dark+ palette */
.code-block .token.comment,
.code-block .token.prolog,
.code-block .token.cdata          { color: #6a9955; font-style: italic; }
.code-block .token.keyword,
.code-block .token.rule           { color: #569cd6; }
.code-block .token.operator       { color: #d4d4d4; }
.code-block .token.string,
.code-block .token.attr-value,
.code-block .token.template-string{ color: #ce9178; }
.code-block .token.number,
.code-block .token.boolean        { color: #b5cea8; }
.code-block .token.function       { color: #dcdcaa; }
.code-block .token.class-name,
.code-block .token.builtin        { color: #4ec9b0; }
.code-block .token.punctuation    { color: #d4d4d4; }
.code-block .token.tag            { color: #4ec9b0; }
.code-block .token.tag .token.punctuation { color: #808080; }
.code-block .token.attr-name,
.code-block .token.property,
.code-block .token.variable       { color: #9cdcfe; }
.code-block .token.interpolation-punctuation { color: #569cd6; }
.code-block .token.important      { color: #569cd6; font-weight: bold; }

/* inline code */
:not(.code-block) > code {
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 0.82em;
    background: #18181b;
    border: 1px solid #27272a;
    border-radius: 4px;
    padding: 1px 5px;
    color: #c4b5fd;
}

/* ── lifecycle diagram ───────────────────────────────────────────────────── */
.lifecycle {
    display: flex;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 4px;
    margin: 16px 0 24px;
}

.lifecycle-step {
    background: #18181b;
    border: 1px solid #27272a;
    border-radius: 8px;
    padding: 14px 16px;
    flex: 1;
    min-width: 150px;
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.lifecycle-step strong {
    font-size: 0.875rem;
    color: #fff;
    font-family: 'JetBrains Mono', monospace;
}

.lifecycle-step span {
    font-size: 0.78rem;
    color: #71717a;
}

.step-label {
    font-size: 0.7rem !important;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #52525b !important;
    font-weight: 600;
}

.lifecycle-arrow {
    color: #3f3f46;
    font-size: 1.2rem;
    padding-top: 22px;
    flex-shrink: 0;
}

/* ── api table ───────────────────────────────────────────────────────────── */
.api-table {
    border: 1px solid #27272a;
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 24px;
    font-size: 0.85rem;
}

.api-row {
    display: grid;
    grid-template-columns: 160px 110px 1fr;
    gap: 0;
    border-bottom: 1px solid #27272a;
    padding: 10px 16px;
    align-items: start;
}

.api-row:last-child { border-bottom: none; }

.api-header {
    background: #18181b;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #52525b;
}

.api-row span { color: #71717a; }
.api-row:not(.api-header) code { color: #c4b5fd; }

/* ── demo box ────────────────────────────────────────────────────────────── */
.demo-box {
    background: #18181b;
    border: 1px solid #27272a;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 16px;
}

.demo-row {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 20px;
    border-bottom: 1px solid #27272a;
}

.demo-row:last-child { border-bottom: none; }

.demo-label {
    font-size: 0.8rem;
    color: #52525b;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 600;
    width: 130px;
    flex-shrink: 0;
}

.demo-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.875rem;
    color: #d4d4d8;
}

.demo-note {
    font-size: 0.82rem !important;
    color: #52525b !important;
    margin-top: 8px !important;
}

/* ── button ──────────────────────────────────────────────────────────────── */
.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    background: #27272a;
    border: 1px solid #3f3f46;
    border-radius: 6px;
    color: #d4d4d8;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.15s;
    vertical-align: middle;
}

.btn:hover { background: #3f3f46; }

/* ── footer ──────────────────────────────────────────────────────────────── */
.footer {
    border-top: 1px solid #27272a;
    padding-top: 32px;
    text-align: center;
    color: #3f3f46;
    font-size: 0.8rem;
}
    </style>
    <meta name="HADARS_HEAD">
</head>
<body>
    <meta name="HADARS_BODY">
</body>
</html>
