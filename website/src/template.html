<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
@import "tailwindcss";
@source not "../.hadars";

@theme inline {
    --color-background:         var(--background);
    --color-foreground:         var(--foreground);
    --color-card:               var(--card);
    --color-card-foreground:    var(--card-foreground);
    --color-primary:            var(--primary);
    --color-primary-foreground: var(--primary-foreground);
    --color-secondary:          var(--secondary);
    --color-secondary-foreground: var(--secondary-foreground);
    --color-muted:              var(--muted);
    --color-muted-foreground:   var(--muted-foreground);
    --color-accent:             var(--accent);
    --color-accent-foreground:  var(--accent-foreground);
    --color-border:             var(--border);
    --color-input:              var(--input);
    --color-ring:               var(--ring);
    --color-destructive:        var(--destructive);
    --radius-sm:  calc(var(--radius) - 4px);
    --radius-md:  calc(var(--radius) - 2px);
    --radius-lg:  var(--radius);
    --radius-xl:  calc(var(--radius) + 4px);
    --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
}

:root {
    /* Deep space palette */
    --background:              oklch(0.04 0.02 280);
    --foreground:              oklch(0.93 0.015 285);
    --card:                    oklch(0.08 0.025 280);
    --card-foreground:         oklch(0.93 0.015 285);
    --primary:                 oklch(0.68 0.28 285);
    --primary-foreground:      oklch(0.98 0 0);
    --secondary:               oklch(0.12 0.035 280);
    --secondary-foreground:    oklch(0.93 0.015 285);
    --muted:                   oklch(0.12 0.035 280);
    --muted-foreground:        oklch(0.50 0.06 280);
    --accent:                  oklch(0.15 0.04 280);
    --accent-foreground:       oklch(0.93 0.015 285);
    --border:                  oklch(0.22 0.07 280);
    --input:                   oklch(0.22 0.07 280);
    --ring:                    oklch(0.68 0.28 285);
    --destructive:             oklch(0.45 0.18 27);
    --radius:                  0.5rem;
}

*, *::before, *::after { box-sizing: border-box; }

body {
    margin: 0;
    background-color: var(--background);
    /* Cosmic nebula background — kept subtle; the canvas starfield carries the detail */
    background-image:
        radial-gradient(ellipse 120% 55% at 50% -5%,  oklch(0.45 0.15 285 / 0.09) 0%, transparent 58%),
        radial-gradient(ellipse 65%  45% at 100% 8%,  oklch(0.50 0.18 240 / 0.06) 0%, transparent 50%),
        radial-gradient(ellipse 50%  40% at 0%   65%, oklch(0.42 0.14 310 / 0.05) 0%, transparent 52%),
        radial-gradient(ellipse 40%  30% at 70%  95%, oklch(0.38 0.12 200 / 0.04) 0%, transparent 50%);
    color: var(--foreground);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    line-height: 1.6;
    font-size: 16px;
    min-height: 100vh;
}

/* Gradient text utility */
.text-gradient {
    background: linear-gradient(
        135deg,
        oklch(0.88 0.10 305) 0%,
        oklch(0.75 0.28 285) 45%,
        oklch(0.72 0.22 220) 100%
    );
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

/* Softer gradient for subheadings */
.text-gradient-soft {
    background: linear-gradient(
        135deg,
        oklch(0.85 0.08 300) 0%,
        oklch(0.72 0.20 285) 100%
    );
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

/* Prism token colours — VS Code Dark+ palette */
.token.comment, .token.prolog, .token.cdata { color: #6a9955; font-style: italic; }
.token.keyword, .token.rule               { color: #569cd6; }
.token.operator                           { color: #d4d4d4; }
.token.string, .token.attr-value,
.token.template-string                    { color: #ce9178; }
.token.number, .token.boolean             { color: #b5cea8; }
.token.function                           { color: #dcdcaa; }
.token.class-name, .token.builtin         { color: #4ec9b0; }
.token.punctuation                        { color: #d4d4d4; }
.token.tag                                { color: #4ec9b0; }
.token.tag .token.punctuation             { color: #808080; }
.token.attr-name, .token.property,
.token.variable                           { color: #9cdcfe; }
.token.interpolation-punctuation          { color: #569cd6; }
.token.important                          { color: #569cd6; font-weight: bold; }
