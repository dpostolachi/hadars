name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - rc

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push version commit + tag
      id-token: write   # npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Default GITHUB_TOKEN has push access when contents: write is set
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Bump version in package.json only (no git commit/tag yet).
      # RC uses prerelease versioning (e.g. 0.1.14-rc.0) and publishes
      # under the "next" dist-tag so it doesn't become the default install.
      - name: Bump version
        id: bump
        run: |
          if [ "${{ inputs.bump }}" = "rc" ]; then
            NEW_VERSION=$(npm version prerelease --preid=rc --no-git-tag-version)
          else
            NEW_VERSION=$(npm version ${{ inputs.bump }} --no-git-tag-version)
          fi
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped to $NEW_VERSION"

      - name: Build
        run: npm run build:all

      - name: Commit, tag, and push
        run: |
          git add package.json
          git commit -m "chore: release ${{ steps.bump.outputs.version }}"
          git tag -a "${{ steps.bump.outputs.version }}" -m "Release ${{ steps.bump.outputs.version }}"
          git push
          git push --tags

      - name: Publish to npm
        run: |
          if [ "${{ inputs.bump }}" = "rc" ]; then
            npm publish --ignore-scripts --provenance --access public --tag next
          else
            npm publish --ignore-scripts --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ inputs.bump }}" = "rc" ]; then
            gh release create "${{ steps.bump.outputs.version }}" \
              --title "RC ${{ steps.bump.outputs.version }}" \
              --generate-notes \
              --prerelease
          else
            gh release create "${{ steps.bump.outputs.version }}" \
              --title "Release ${{ steps.bump.outputs.version }}" \
              --generate-notes
          fi
