name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push version commit + tag
      id-token: write   # npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Default GITHUB_TOKEN has push access when contents: write is set
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # Install without running prepare/build scripts — we build explicitly below
      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Bump version in package.json only (no git commit/tag yet)
      - name: Bump version
        id: bump
        run: |
          NEW_VERSION=$(npm version ${{ inputs.bump }} --no-git-tag-version)
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped to $NEW_VERSION"

      - name: Build
        run: npm run build:all

      # Commit the updated package.json, create an annotated tag, then push both
      - name: Commit, tag, and push
        run: |
          git add package.json
          git commit -m "chore: release ${{ steps.bump.outputs.version }}"
          git tag -a "${{ steps.bump.outputs.version }}" -m "Release ${{ steps.bump.outputs.version }}"
          git push
          git push --tags

      # dist/ is already built above; skip lifecycle scripts to avoid rebuilding
      - name: Publish to npm
        run: npm publish --ignore-scripts --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.bump.outputs.version }}" \
            --title "Release ${{ steps.bump.outputs.version }}" \
            --generate-notes
