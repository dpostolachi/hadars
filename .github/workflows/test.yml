name: SSR Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        react-version: ["19", "18"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install hadars dependencies
        run: bun install --ignore-scripts

      - name: Pin React 18
        if: matrix.react-version == '18'
        run: bun add -d react@^18.3.0 react-dom@^18.3.0 @types/react@^18 @types/react-dom@^18

      - name: Build hadars
        run: bun run build:all

      - name: Install website dependencies
        run: npm install --ignore-scripts
        working-directory: website

      - name: Pin website React 18
        if: matrix.react-version == '18'
        run: npm install react@^18.3.0 react-dom@^18.3.0 --legacy-peer-deps
        working-directory: website

      - name: Build website
        run: bun node_modules/.bin/hadars build
        working-directory: website

      - name: Start website server
        run: |
          bun node_modules/.bin/hadars run > /tmp/hadars-server.log 2>&1 &
          echo "HADARS_SERVER_PID=$!" >> "$GITHUB_ENV"
        working-directory: website

      - name: Wait for website server to be ready
        run: |
          for i in $(seq 1 60); do
            if ! kill -0 "$HADARS_SERVER_PID" 2>/dev/null; then
              echo "Server process exited prematurely. Log:"
              cat /tmp/hadars-server.log
              exit 1
            fi
            if curl -sf http://localhost:9090/ -o /dev/null; then
              echo "Server is ready after ${i}s"
              exit 0
            fi
            echo "Waiting... (${i}/60)"
            sleep 1
          done
          echo "Server did not start within 60s. Log:"
          cat /tmp/hadars-server.log
          exit 1

      - name: Run unit tests
        run: bun test test/render-compare.test.tsx

      - name: Run SSR tests
        run: bun test --timeout 60000 test/ssr.test.ts test/lambda.test.ts

      - name: Stop website server
        if: always()
        run: kill "$HADARS_SERVER_PID" 2>/dev/null || true
