name: SSR Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      # ── 1. Build the hadars library ─────────────────────────────────────────

      - name: Install hadars dependencies
        run: npm install --ignore-scripts

      - name: Build hadars
        run: npm run build:all

      # ── 2. Build the website (uses hadars as file:..) ───────────────────────

      - name: Install website dependencies
        run: npm install --ignore-scripts
        working-directory: website

      - name: Build website
        run: node node_modules/.bin/hadars build
        working-directory: website

      # ── 3. Run SSR integration tests with Bun ───────────────────────────────
      # Start the website server as a background step so we control its lifecycle
      # and can see any startup errors in the log.
      - name: Start website server
        run: |
          node node_modules/.bin/hadars run &
          echo "HADARS_SERVER_PID=$!" >> "$GITHUB_ENV"
        working-directory: website

      - name: Wait for website server to be ready
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:9090/ -o /dev/null; then
              echo "Server is ready after ${i}s"
              exit 0
            fi
            echo "Waiting... (${i}/60)"
            sleep 1
          done
          echo "Server did not start within 60s"
          exit 1

      - name: Run renderer comparison tests
        run: bun test test/render-compare.test.tsx

      - name: Run SSR tests
        run: bun test --timeout 60000 test/ssr.test.ts

      - name: Stop website server
        if: always()
        run: kill "$HADARS_SERVER_PID" 2>/dev/null || true
